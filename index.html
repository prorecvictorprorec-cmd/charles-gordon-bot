<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Віктор Кравченко — Zvuko Shop</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --yt-red: #ff0000;
            --yt-blue: #3ea6ff;
            --text: #ffffff;
            --text-gray: #aaaaaa;
        }

        body { font-family: 'Roboto', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Дизайн шапки в стилі каналу */
        .header { 
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, #1e1e1e 100%), url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1000');
            background-size: cover; background-position: center;
            height: 220px; border-radius: 16px; border: 1px solid #333;
            display: flex; align-items: flex-end; padding: 30px; margin-bottom: 25px;
        }
        .header h1 { margin: 0; font-size: 32px; }
        .badge { background: var(--yt-red); padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 10px; display: inline-block; }

        .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: var(--yt-blue); }

        /* Плеєр та вітрина */
        .main-video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; margin-bottom: 20px; border: 0; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .video-thumb { cursor: pointer; transition: 0.2s; }
        .video-thumb:hover { transform: translateY(-3px); }
        .video-thumb img { width: 100%; border-radius: 8px; border: 1px solid #444; }
        .video-thumb span { font-size: 12px; display: block; margin-top: 5px; color: var(--text-gray); line-height: 1.2; height: 2.4em; overflow: hidden; }

        /* Бот */
        .chat { background: #000; height: 200px; border-radius: 8px; padding: 15px; overflow-y: auto; font-size: 14px; border: 1px solid #222; margin-bottom: 15px; }
        .btn { background: #333; border: 1px solid #444; color: #fff; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { background: #444; border-color: var(--yt-blue); }

        .footer { text-align: center; padding: 30px; color: var(--text-gray); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Віктор Кравченко</h1>
            <div style="color: var(--text-gray);">Звукорежи
